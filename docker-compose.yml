services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webrtc-backend
    restart: unless-stopped
    env_file: .env
    networks:
      - internal

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: webrtc-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
